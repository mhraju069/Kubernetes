apiVersion: batch/v1
kind: Job

metadata:
  name: demo-job
  namespace: nginx

spec:
  completions: 1
  parallelism: 1

  template:
    metadata:
      name: demo-job-pod
      labels:
        app: batch-job

    spec:
      restartPolicy: Never
      containers:
        - name: batch-container
          image: busybox:latest
          command: [ "sh", "-c", "echo 'Hello from batch job'; sleep 10" ]