apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql-statefulset
  namespace: mysql

spec:
  serviceName: mysql-service
  replicas: 2

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      name: mysql-pod
      labels:
        app: mysql
    spec:
      containers:
        - name: sql-container
          image: mysql:latest
          ports:
            - containerPort: 3306
          env:
          - name: MYSQL_ROOT_PASSWORD
            value: root

          - name: MYSQL_DATABASE
            value: devops

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql



  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi