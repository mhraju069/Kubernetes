apiVersion: apps/v1
kind: Deployment

metadata:
  name: apache-deployment
  namespace: apache

spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache

  template:
    metadata:
      name: apache-dep-pod
      labels:
        app: apache

    spec:
      containers:
        - name: apache
          image: httpd:latest
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "256m"
            limits:
              memory: "128Mi"
              cpu: "512m"
